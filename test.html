<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Virtual Tour</title>

<!-- Pannellum CSS -->
<link rel="stylesheet" href="https://pannellum.org/css/pannellum.css"/>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
}

/* Panorama Viewer */
#panorama {
    width: 100%;
    height: 100vh;
}

/* Start Screen */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    color: white;
}

#startScreen h1 {
    font-size: 28px;
}

#startBtn {
    padding: 12px 25px;
    border: none;
    background: #b08a5b;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
}

/* Bottom thumbnails */
.nav {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    z-index: 5;
}

.nav img {
    width: 90px;
    height: 60px;
    margin: 5px;
    cursor: pointer;
    border: 2px solid white;
    transition: 0.3s;
}

.nav img:hover {
    transform: scale(1.1);
}

/* Title */
.title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    z-index: 5;
    background: rgba(0,0,0,0.5);
    padding: 8px 12px;
}
</style>
</head>

<body>

<!-- Start Screen -->
<div id="startScreen">
    <h1>Experience Virtual Tour</h1>
    <button id="startBtn">Start Tour</button>
</div>

<!-- Title -->
<div class="title">My Virtual Tour</div>

<!-- Panorama -->
<div id="panorama"></div>

<!-- Bottom Navigation -->
<div class="nav">
    <img src="/assets/img/4976.webp" onclick="loadScene('living')">
    <img src="/assets/img/arch-windows.webp" onclick="loadScene('bedroom')">
    <img src="/assets/img/casement-window-1000x1000.webp" onclick="loadScene('kitchen')">
</div>

<!-- Pannellum JS -->
<script src="https://pannellum.org/js/pannellum.js"></script>

<script>
let viewer;

document.getElementById("startBtn").addEventListener("click", function () {

    document.getElementById("startScreen").style.display = "none";

    viewer = pannellum.viewer('panorama', {
        default: {
            firstScene: 'living',
            sceneFadeDuration: 1000
        },

        scenes: {

            living: {
                title: "Living Room",
                panorama: "../assets/img/4976.webp",
                hotSpots: [
                    {
                        pitch: 0,
                        yaw: 100,
                        type: "scene",
                        text: "Go to Bedroom",
                        sceneId: "bedroom"
                    }
                ]
            },

            bedroom: {
                title: "Bedroom",
                panorama: "../assets/img/arch-windows.webp",
                hotSpots: [
                    {
                        pitch: 0,
                        yaw: -100,
                        type: "scene",
                        text: "Go to Kitchen",
                        sceneId: "kitchen"
                    }
                ]
            },

            kitchen: {
                title: "Kitchen",
                panorama: "../assets/img/casement-window-1000x1000.webp"
            }
        }
    });

});

function loadScene(scene) {
    if (viewer) {
        viewer.loadScene(scene);
    }
}
</script>

</body>
</html>
